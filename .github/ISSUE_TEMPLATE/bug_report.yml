name: Bug Report
description: Report a bug in ReqVars
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: burp-version
    attributes:
      label: Burp Suite Version
      placeholder: "e.g., 2025.5"
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "e.g., 17.0.11"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15.5, Windows 11, Ubuntu 24.04"
    validations:
      required: true
